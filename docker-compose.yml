version: '3.8'

services:
  smartbiz:
    build: .
    container_name: smartbiz-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=wsgi:app
    env_file:
      - .env.production
    volumes:
      - ./reports_output:/app/reports_output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
